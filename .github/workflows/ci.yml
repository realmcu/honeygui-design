name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Build Webview
        run: npm run build:webview

      - name: Unit Tests
        run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsdl2-dev xvfb python3-pip
          pip install scons kconfiglib

      - name: Install npm dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Clone smartwatch template
        run: git clone --depth 1 https://gitee.com/realmcu/honeygui-template-smartwatch.git /tmp/smartwatch-project

      - name: Run E2E tests
        env:
          TEST_WORKSPACE: /tmp/smartwatch-project
        run: xvfb-run -a npm run test:e2e
