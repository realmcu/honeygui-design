<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{i18n_title}}</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}'; worker-src 'none';">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: #ffffff; }
        .tabs { display: flex; border-bottom: 1px solid #3e3e42; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px; cursor: pointer; background-color: transparent;
            border: none; color: #969696; font-size: 14px; transition: all 0.2s;
            user-select: none; outline: none; position: relative; z-index: 10;
        }
        .tab.active { color: #007acc; border-bottom: 2px solid #007acc; }
        .form-container {
            background-color: #252526; border: 1px solid #3e3e42;
            border-radius: 4px; padding: 20px;
        }
        .form-group { margin-bottom: 20px; width: 100%; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #d4d4d4; }
        .form-control {
            width: 100%; padding: 8px 12px; background-color: #3c3c3c;
            border: 1px solid #3e3e42; border-radius: 3px; color: #d4d4d4;
            font-size: 14px; box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: #007acc; }
        .input-group { display: flex; }
        .input-group .form-control { flex: 1; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .btn-icon {
            padding: 8px 12px; background-color: #0e639c; border: 1px solid #007acc;
            border-left: none; border-top-right-radius: 3px; border-bottom-right-radius: 3px;
            color: #ffffff; cursor: pointer; font-size: 14px;
        }
        .btn-icon:hover { background-color: #1177bb; }
        select.form-control { cursor: pointer; }
        .btn-create {
            width: 100%; padding: 12px; background-color: #107c10;
            border: 1px solid #107c10; border-radius: 4px; color: #ffffff;
            font-size: 16px; font-weight: 500; cursor: pointer;
            transition: background-color 0.2s; margin-top: 10px;
        }
        .btn-create:hover:not(:disabled) { background-color: #148514; }
        .btn-create:disabled { background-color: #3c3c3c; border-color: #3e3e42; cursor: not-allowed; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-row .form-group { min-width: 0; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .error-message {
            background-color: rgba(231, 76, 60, 0.15); border: 1px solid #e74c3c;
            border-radius: 4px; color: #e74c3c; padding: 12px; margin-bottom: 20px;
            white-space: pre-line; font-size: 14px; line-height: 1.4;
        }
        .error-message.hidden { display: none; }
        .template-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 20px;
        }
        .template-card {
            background-color: #2d2d30; border: 2px solid #3e3e42;
            border-radius: 6px; padding: 15px; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .template-card:hover { border-color: #007acc; background-color: #333337; }
        .template-card.selected { border-color: #007acc; background-color: #1e3a5f; }
        .template-card h3 {
            margin: 0 0 8px 0; font-size: 16px; color: #ffffff;
        }
        .template-card p {
            margin: 0 0 8px 0; font-size: 13px; color: #969696; line-height: 1.4;
        }
        .template-card .badge {
            display: inline-block; background-color: #0e639c; color: #ffffff;
            padding: 2px 8px; border-radius: 3px; font-size: 11px;
        }
    </style>
</head>
<body>
    <h1>{{i18n_createProject}}</h1>
    <div id="errorMessage" class="error-message hidden"></div>
    
    <div class="tabs">
        <button id="tab-empty" class="tab active">{{i18n_createEmptyProject}}</button>
        <button id="tab-template" class="tab">{{i18n_createTemplateProject}}</button>
    </div>
    
    <div id="empty-tab" class="tab-content" style="display: block;">
        <div class="form-container">
            <div class="form-group">
                <label for="projectName">{{i18n_projectName}}</label>
                <input type="text" id="projectName" class="form-control" value="NewProject" />
            </div>
            
            <div class="form-group">
                <label for="saveLocation">{{i18n_saveLocation}}</label>
                <div class="input-group">
                    <input type="text" id="saveLocation" class="form-control" value="{{homeDir}}" />
                    <button class="btn-icon" id="selectFolderButton">📁</button>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="appId">{{i18n_appId}}</label>
                    <input type="text" id="appId" class="form-control" value="com.example.NewProject" />
                </div>
                <div class="form-group">
                    <label for="resolution">{{i18n_resolution}}</label>
                    <select id="resolution" class="form-control">
                        <option value="410X502">410X502</option>
                        <option value="480X272">480X272</option>
                        <option value="800X480">800X480</option>
                        <option value="1024X600">1024X600</option>
                        <option value="1280X720">1280X720</option>
                        <option value="custom">{{i18n_custom}}</option>
                    </select>
                    <div id="customResolution" style="display: none; margin-top: 8px;">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="number" id="customWidth" class="form-control" placeholder="{{i18n_width}}" min="1" style="flex: 1;" />
                            <span style="color: #969696;">×</span>
                            <input type="number" id="customHeight" class="form-control" placeholder="{{i18n_height}}" min="1" style="flex: 1;" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cornerRadius">{{i18n_screenShape}}</label>
                    <select id="cornerRadius" class="form-control">
                        <option value="0">{{i18n_rectangle}}</option>
                        <option value="-1">{{i18n_circle}}</option>
                        <option value="20" selected>{{i18n_rounded20}}</option>
                        <option value="40">{{i18n_rounded40}}</option>
                        <option value="60">{{i18n_rounded60}}</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="targetEngine">{{i18n_targetEngine}}</label>
                    <select id="targetEngine" class="form-control">
                        <option value="honeygui">HoneyGUI</option>
                        <option value="lvgl">LVGL</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="minSdk">{{i18n_minimumSdk}}</label>
                    <select id="minSdk" class="form-control">
                        <option value="API 2: HoneyGUI V1.1.0">API 2: HoneyGUI V1.1.0</option>
                        <option value="API 3: HoneyGUI V1.2.0">API 3: HoneyGUI V1.2.0</option>
                        <option value="API 4: HoneyGUI V2.0.0">API 4: HoneyGUI V2.0.0</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pixelMode">{{i18n_pixelMode}}</label>
                    <select id="pixelMode" class="form-control">
                        <option value="ARGB8888">ARGB8888</option>
                        <option value="RGB565">RGB565</option>
                        <option value="ARGB4444">ARGB4444</option>
                        <option value="L8">L8</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="romfsBaseAddr">{{i18n_romfsBaseAddr}}</label>
                <input type="text" id="romfsBaseAddr" class="form-control" value="{{defaultRomfsAddr}}" placeholder="{{defaultRomfsAddr}}" />
            </div>
            
            <button id="createButton" class="btn-create" disabled>{{i18n_create}}</button>
        </div>
    </div>
    
    <div id="template-tab" class="tab-content" style="display: none;">
        <div class="form-container">
            <div class="form-group">
                <label>{{i18n_selectTemplate}}</label>
                <div id="templateList" class="template-list"></div>
            </div>
            
            <div class="form-group">
                <label for="templateProjectName">{{i18n_projectName}}</label>
                <input type="text" id="templateProjectName" class="form-control" value="NewProject" />
            </div>
            
            <div class="form-group">
                <label for="templateSaveLocation">{{i18n_saveLocation}}</label>
                <div class="input-group">
                    <input type="text" id="templateSaveLocation" class="form-control" value="{{homeDir}}" />
                    <button class="btn-icon" id="selectTemplateFolderButton">📁</button>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="templateAppId">{{i18n_appId}}</label>
                    <input type="text" id="templateAppId" class="form-control" value="com.example.NewProject" />
                </div>
                <div class="form-group">
                    <label for="templateResolution">{{i18n_resolution}}</label>
                    <select id="templateResolution" class="form-control">
                        <option value="410X502">410X502</option>
                        <option value="480X272">480X272</option>
                        <option value="800X480">800X480</option>
                        <option value="1024X600">1024X600</option>
                        <option value="1280X720">1280X720</option>
                        <option value="custom">{{i18n_custom}}</option>
                    </select>
                    <div id="templateCustomResolution" style="display: none; margin-top: 8px;">
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="number" id="templateCustomWidth" class="form-control" placeholder="{{i18n_width}}" min="1" style="flex: 1;" />
                            <span style="color: #969696;">×</span>
                            <input type="number" id="templateCustomHeight" class="form-control" placeholder="{{i18n_height}}" min="1" style="flex: 1;" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="templateMinSdk">{{i18n_minimumSdk}}</label>
                    <select id="templateMinSdk" class="form-control">
                        <option value="API 2: HoneyGUI V1.1.0">API 2: HoneyGUI V1.1.0</option>
                        <option value="API 3: HoneyGUI V1.2.0">API 3: HoneyGUI V1.2.0</option>
                        <option value="API 4: HoneyGUI V2.0.0">API 4: HoneyGUI V2.0.0</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="templatePixelMode">{{i18n_pixelMode}}</label>
                    <select id="templatePixelMode" class="form-control">
                        <option value="ARGB8888">ARGB8888</option>
                        <option value="RGB565">RGB565</option>
                        <option value="ARGB4444">ARGB4444</option>
                        <option value="L8">L8</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="templateRomfsBaseAddr">{{i18n_romfsBaseAddr}}</label>
                <input type="text" id="templateRomfsBaseAddr" class="form-control" value="{{defaultRomfsAddr}}" placeholder="{{defaultRomfsAddr}}" />
            </div>
            
            <button id="createTemplateButton" class="btn-create" disabled>{{i18n_createFromTemplate}}</button>
        </div>
    </div>
    
    <script nonce="{{nonce}}">
        const vscode = acquireVsCodeApi();
        let selectedTemplate = null;
        let templates = [];
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const content = document.getElementById(tabId + '-tab');
            if (content) content.style.display = 'block';
            const tab = document.getElementById('tab-' + tabId);
            if (tab) tab.classList.add('active');
            validateForm();
        }
        
        function selectFolder() { vscode.postMessage({ command: 'selectFolder' }); }
        function selectTemplateFolder() { vscode.postMessage({ command: 'selectTemplateFolder' }); }
        
        function validateForm() {
            const projectName = document.getElementById('projectName').value.trim();
            const saveLocation = document.getElementById('saveLocation').value.trim();
            const createButton = document.getElementById('createButton');
            if (projectName || saveLocation) hideError();
            if (createButton) createButton.disabled = !projectName || !saveLocation;
            
            // Validate template form
            const templateProjectName = document.getElementById('templateProjectName')?.value.trim();
            const templateSaveLocation = document.getElementById('templateSaveLocation')?.value.trim();
            const createTemplateButton = document.getElementById('createTemplateButton');
            if (createTemplateButton) {
                createTemplateButton.disabled = !templateProjectName || !templateSaveLocation || !selectedTemplate;
            }
        }
        
        function createProject() {
            const romfsAddr = document.getElementById('romfsBaseAddr').value.trim();
            
            // 验证地址格式
            if (romfsAddr && !/^0x[0-9A-Fa-f]+$/.test(romfsAddr)) {
                showError('{{i18n_invalidRomfsAddr}}');
                return;
            }
            
            // 获取分辨率
            let resolution = document.getElementById('resolution').value;
            if (resolution === 'custom') {
                const width = document.getElementById('customWidth').value.trim();
                const height = document.getElementById('customHeight').value.trim();
                if (!width || !height || width <= 0 || height <= 0) {
                    showError('{{i18n_invalidCustomResolution}}');
                    return;
                }
                resolution = `${width}X${height}`;
            }
            
            vscode.postMessage({
                command: 'createProject',
                config: {
                    projectName: document.getElementById('projectName').value.trim(),
                    saveLocation: document.getElementById('saveLocation').value.trim(),
                    appId: document.getElementById('appId').value.trim(),
                    resolution: resolution,
                    cornerRadius: parseInt(document.getElementById('cornerRadius').value, 10),
                    targetEngine: document.getElementById('targetEngine').value,
                    minSdk: document.getElementById('minSdk').value,
                    pixelMode: document.getElementById('pixelMode').value,
                    romfsBaseAddr: romfsAddr || '{{defaultRomfsAddr}}'
                }
            });
        }
        
        function createTemplateProject() {
            if (!selectedTemplate) {
                showError('{{i18n_pleaseSelectTemplate}}');
                return;
            }
            
            const romfsAddr = document.getElementById('templateRomfsBaseAddr').value.trim();
            
            // 验证地址格式
            if (romfsAddr && !/^0x[0-9A-Fa-f]+$/.test(romfsAddr)) {
                showError('{{i18n_invalidRomfsAddr}}');
                return;
            }
            
            // 获取分辨率
            let resolution = document.getElementById('templateResolution').value;
            if (resolution === 'custom') {
                const width = document.getElementById('templateCustomWidth').value.trim();
                const height = document.getElementById('templateCustomHeight').value.trim();
                if (!width || !height || width <= 0 || height <= 0) {
                    showError('{{i18n_invalidCustomResolution}}');
                    return;
                }
                resolution = `${width}X${height}`;
            }
            
            vscode.postMessage({
                command: 'createTemplateProject',
                config: {
                    templateId: selectedTemplate,
                    projectName: document.getElementById('templateProjectName').value.trim(),
                    saveLocation: document.getElementById('templateSaveLocation').value.trim(),
                    appId: document.getElementById('templateAppId').value.trim(),
                    resolution: resolution,
                    targetEngine: 'honeygui',
                    minSdk: document.getElementById('templateMinSdk').value,
                    pixelMode: document.getElementById('templatePixelMode').value,
                    romfsBaseAddr: romfsAddr || '{{defaultRomfsAddr}}'
                }
            });
        }
        
        function selectTemplateCard(templateId) {
            selectedTemplate = templateId;
            document.querySelectorAll('.template-card').forEach(card => {
                card.classList.toggle('selected', card.dataset.templateId === templateId);
            });
            
            // Update recommended resolution
            const template = templates.find(t => t.id === templateId);
            if (template) {
                document.getElementById('templateResolution').value = template.recommendedResolution;
            }
            
            validateForm();
        }
        
        function renderTemplates(templateList) {
            templates = templateList;
            const container = document.getElementById('templateList');
            container.innerHTML = templateList.map(t => `
                <div class="template-card" data-template-id="${t.id}">
                    <h3>${t.name}</h3>
                    <p>${t.description}</p>
                    <span class="badge">${t.size}</span>
                </div>
            `).join('');
            
            // 添加点击事件监听
            container.querySelectorAll('.template-card').forEach(card => {
                card.addEventListener('click', function() {
                    selectTemplateCard(this.dataset.templateId);
                });
            });
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.remove('hidden');
            setTimeout(() => hideError(), 5000);
        }
        
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('tab-empty')?.addEventListener('click', () => switchTab('empty'));
            document.getElementById('tab-template')?.addEventListener('click', () => switchTab('template'));
            document.getElementById('selectFolderButton')?.addEventListener('click', selectFolder);
            document.getElementById('createButton')?.addEventListener('click', createProject);
            
            document.getElementById('selectTemplateFolderButton')?.addEventListener('click', selectTemplateFolder);
            document.getElementById('createTemplateButton')?.addEventListener('click', createTemplateProject);
            
            ['saveLocation', 'appId', 'projectName'].forEach(id => {
                document.getElementById(id)?.addEventListener('input', validateForm);
            });
            ['resolution', 'minSdk', 'pixelMode'].forEach(id => {
                document.getElementById(id)?.addEventListener('change', validateForm);
            });
            
            // 监听分辨率选择变化
            document.getElementById('resolution')?.addEventListener('change', function() {
                const customDiv = document.getElementById('customResolution');
                if (this.value === 'custom') {
                    customDiv.style.display = 'block';
                } else {
                    customDiv.style.display = 'none';
                }
            });
            
            document.getElementById('templateResolution')?.addEventListener('change', function() {
                const customDiv = document.getElementById('templateCustomResolution');
                if (this.value === 'custom') {
                    customDiv.style.display = 'block';
                } else {
                    customDiv.style.display = 'none';
                }
            });
            
            ['templateSaveLocation', 'templateAppId', 'templateProjectName'].forEach(id => {
                document.getElementById(id)?.addEventListener('input', validateForm);
            });
            ['templateResolution', 'templateMinSdk', 'templatePixelMode'].forEach(id => {
                document.getElementById(id)?.addEventListener('change', validateForm);
            });
            
            document.getElementById('projectName')?.addEventListener('input', function() {
                const appIdInput = document.getElementById('appId');
                const name = this.value.trim();
                if (appIdInput.value.startsWith('com.example.')) {
                    appIdInput.value = 'com.example.' + name;
                }
            });
            
            // 请求后端发送模板列表
            vscode.postMessage({ command: 'getTemplates' });
            
            validateForm();
        });
        
        window.addEventListener('message', event => {
            const msg = event.data;
            if (msg.command === 'folderSelected') {
                document.getElementById('saveLocation').value = msg.folderPath;
                hideError();
                validateForm();
            } else if (msg.command === 'templateFolderSelected') {
                document.getElementById('templateSaveLocation').value = msg.folderPath;
                hideError();
                validateForm();
            } else if (msg.command === 'templatesLoaded') {
                renderTemplates(msg.templates);
            } else if (msg.command === 'error') {
                showError(msg.text);
            }
        });
    </script>
</body>
</html>
