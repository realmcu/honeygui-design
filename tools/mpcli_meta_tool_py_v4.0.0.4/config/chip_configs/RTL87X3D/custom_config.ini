[ic_info]
ic_type = IC_87X3D
img_hdr_size = 0x1000 ; image header size

[uart_property]
default_open_baudrate = 115200  ; for 2w, it's 115200, for 1w, it's 2000000
default_modify_baudrate = 2000000 ; only valid for 2w

[data uart timeout]
wait_for_load_rp_s = 0.11

[flash setting]
flash_address_non_cache_mask = 0x0  ;0x0:don't need to adjust address, 0x1000000: non-cache mask

occd_img_addr = 0x04002000  ; 0x2000000 ; non-cache flash address
occd_img_size = 0x2000
flash_protection_start_addr = 0x2000000 ; non-cache flash address
flash_protection_end_addr = 0x02004000  ; non-cache flash address
flash_size = 0x1000000
flash_start_address = 0x2000000

[dbg board sleep time]
dbg_board_wait_for_console_s = 0.02 ; second, for easy mode,wait for \r\n
wait_to_enter_hci_mode_s = 9  ; wait for target device to enter into hci mode

[app cli]
app_cli_uart_baudrate = 2000000
detect_app_state_time_s = 15 ; second, dynamically wait for application cli through \r
wait_for_enter_console_s = 0.01 ;second, wait for \r
cli_read_timeout_ms = 200

;used for ic 8763C / 8763D
[handshake setting]
log_enable = 0xFF ; log enable: 0xFF, log disable: 0
read_timeout_ms = 10 ; handshake response read timeout ms
handshake_timeout_s = 100 ; unit second
is_reboot = True ; True:reboot before handshake, False:don't reboot
reboot_type = 0 ; 0: hci reboot, 1:bud reboot\r

;if it's needed, It should be modified for ic 8763D V2 
[update ram patch]
enable = True
ram_path = RTL8763D_V2_ram_patch.bin

;used for ic 8763C / 8763D
[spic select]
spic_select_number = 0
spic_select_try_times_max = 10



