[uart_property]
default_open_baudrate = 115200
default_modify_baudrate = 1000000
read_timeout_s = 40
write_timeout_s = 30
inter_byte_timeout_s = 10
wait_for_baudrate_change_s = 0.01

[flash setting]
flash_start_address = 0x800000
flash_address_non_cache_mask = 0x1000000  ;0x0:don't need to adjust address, 0x1000000: non-cache mask
flash_size = 0x400000

[hci delay time]
sleep_after_dbg_password_s = 2
wait_for_flash_init_s = 0.01
wait_for_reboot_s = 0.5
wait_for_ram_patch_trigger_s = 0.01
wait_for_fw_loader_s = 0.2
wait_for_app_run_s = 9

[data uart timeout]
set_baudrate_timeout_s = 1
fsbl_con_read_timeout_ms = 200
fsbl_con_delay_per_cycle_ms = 100
wait_for_connecting_fsbl_s = 80
wait_for_load_rp_s = 0.01

[packet size]
2w_packet_size = 0x4000
1w_packet_size = 0x1000

[retry_times]
read_retry_times_max = 10
erase_retry_times_max = 10
program_retry_times_max = 10
verify_retry_times_max = 10

[auto detect mode]
enable = True



