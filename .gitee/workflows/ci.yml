name: CI Build and Test

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Compile TypeScript
        run: npm run compile
        
      - name: Build Webview
        run: npm run build:webview
        
      - name: Package extension
        run: npx vsce package --allow-missing-repository || echo "Package step failed but continuing"
